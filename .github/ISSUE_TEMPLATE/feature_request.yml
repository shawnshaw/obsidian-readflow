name: Feature request
description: Suggest an improvement for ReadFlow
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: What would you like to happen?
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Include workflow context, screenshots, or examples if helpful.
